<!DOCTYPE html>
<html>
<head>
  <title>Finpla - Controle Financeiro</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>
  <h1>--01--</h1>

  <div id="transacoes">
   
    <ul id="lista-transacoes"></ul>
  </div>

  <div id="formulario-transacao">
    <h2>Adicionar item</h2>
    <input type="text" id="descricao" placeholder="Descrição">
    <input type="number" id="valor" placeholder="Valor">
    <select id="tipo">
      <option value="receita">Receita</option>
      <option value="despesa">Despesa</option>
    </select>
    <button id="adicionar">Adicionar</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js"></script>
  <script src="/public/firebase-config.js"></script>
  <script src="/public/script.js"></script>
</body>
</html>
