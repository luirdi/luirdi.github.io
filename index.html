<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="/frontend/logo.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/frontend/logo.ico" type="image/x-icon">
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/styles.css" />
  <link rel="manifest" href="/manifest.json" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('ServiceWorker registration successful');
          })
          .catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
  <style>
    body {
      overflow-x: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      touch-action: pan-y;
    }

    html {
      overflow-x: hidden;
      overscroll-behavior: none;
    }
  </style>
   <title>FinPlanner - Planejamento Financeiro</title>

<body>
  <div class="container mt-5 text-center">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="d-flex align-items-center">
        <h1>FinPlanner_</h1>
      </div>
      <div class="date-navigation d-flex align-items-center">
        <div class="month-selector me-3">
          <button class="btn btn-link p-0" onclick="changeMonth(1)" title="Próximo mês"><img src="/icons/arrow-up.png" alt="Próximo mês" width="20" height="20"></button>
          <div id="currentMonth" class="current-date">Janeiro</div>
          <button class="btn btn-link p-0" onclick="changeMonth(-1)" title="Mês anterior" id="arrow-down1"><img src="/icons/arrow-down.png" alt="Mês anterior" width="20" height="20"></button>
        </div>
        <div class="year-selector">
          <button class="btn btn-link p-0" onclick="changeYear(1)" title="Próximo ano"><img src="/icons/arrow-up.png" alt="Próximo ano" width="20" height="20"></button>
          <div id="currentYear" class="current-date">2025</div>
          <button class="btn btn-link p-0" onclick="changeYear(-1)" title="Ano anterior" id="arrow-down2"><img src="/icons/arrow-down.png" alt="Ano anterior" width="20" height="20"></button>
        </div>
      </div>
    </div>
  </div>

  <div id="dashboardContainer" class="container mt-5">
    <div class="row">
      <div class="col-md-4">
        <div class="card mb-3 summary-card expenses">
          <div class="card-body">
            <h5 class="card-title">Despesas</h5>
            <h3 id="totalExpenses" class="text-danger">R$ 0,00</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card mb-3 summary-card credit-card">
          <div class="card-body">
            <h5 class="card-title">Cartão de Crédito</h5>
            <h3 id="totalCreditCard" class="text-danger">R$ 0,00</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card mb-3 summary-card other-payments">
          <div class="card-body">
            <h5 class="card-title">Outras Despesas</h5>
            <h3 id="totalOtherExpenses" class="text-danger">R$ 0,00</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-md-12">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Adicionar Transação</h5>
            <form id="transactionForm">
              <div class="row">
                <div class="col-md-3 mb-3">
                  <label for="description" class="form-label">Descrição</label>
                  <input type="text" class="form-control" id="description" required />
                </div>
                <div class="col-md-3 mb-3">
                  <label for="amount" class="form-label">Valor</label>
                  <input type="number" class="form-control" id="amount" step="0.01" required />
                </div>
                <div class="col-md-3 mb-3">
                  <label for="date" class="form-label">Data</label>
                  <input type="date" class="form-control" id="date" required />
                </div>
                <div class="col-md-3 mb-3">
                  <label for="category" class="form-label">Categoria</label>
                  <select class="form-control" id="category" required>
                    <option value="" disabled selected>Selecione</option>
                    <option value="alimentacao">Alimentação</option>
                    <option value="man_parking_fuel">Carro-Moto</option>
                    <option value="cuidados_pessoais">Cuidados Pessoais</option>
                    <option value="educacao_qualificacao">Educação</option>
                    <option value="estorno_pagamento">Estorno/Pagamento</option>
                    <option value="farmacia">Farmácia</option>
                    <option value="outros">Outros</option>
                    <option value="presente">Presente</option>
                    <option value="uber">Uber</option>
                    <option value="utensilios_casa">Casa</option>
                    <option value="vestuario">Vestuário</option>
                  </select>
                </div>
                <div class="col-md-3 mb-3">
                  <label for="type" class="form-label">Tipo</label>
                  <select class="form-control" id="type" required>
                    <option value="paymentType">Forma de Pagamento</option>
                    <option value="credit_card">Cartão de Crédito</option>
                    <option value="other_payments">Outras Despesas</option>
                  </select>
                </div>
                <div class="col-md-3 mb-3 credit-card-fields" style="display: none;">
                  <label for="installments" class="form-label">Parcelas</label>
                  <select class="form-control" id="installments">
                    <option value="1">1x</option>
                    <option value="2">2x</option>
                    <option value="3">3x</option>
                    <option value="4">4x</option>
                    <option value="5">5x</option>
                    <option value="6">6x</option>
                    <option value="7">7x</option>
                    <option value="8">8x</option>
                    <option value="9">9x</option>
                    <option value="10">10x</option>
                    <option value="11">11x</option>
                    <option value="12">12x</option>
                  </select>
                </div>
                <div class="col-md-3 mb-3 credit-card-fields" style="display: none;">
                  <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" id="invoiceClosed">
                    <label class="form-check-label" for="invoiceClosed">
                      Fatura Fechada
                    </label>
                  </div>
                </div>
              </div>
              <button type="submit" class="btn btn-primary">
                Adicionar Transação
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-md-12">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Outras Despesas</h5>
            <div class="table-responsive">
              <table class="table">
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="transactionsList"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Credit Card Transactions Table -->
    <div class="row mt-4">
      <div class="col-md-12">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Cartão de Crédito</h5>
            <div class="table-responsive">
              <table class="table">
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="creditCardTransactionsList"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <button onclick="firebase.auth().signOut().then(() => window.location.href = '/login.html')" class="btn btn-outline-danger btn-sm" id="logoutButton">Sair</button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-database-compat.js"></script>
  <script src="/frontend/app.js"></script>
</body>

</html>
