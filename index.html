<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPla - Planejamento Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container mt-5 text-center">
        <h2 class="mb-4">FinPla</h2>
    </div>

    <div id="dashboardContainer" class="container mt-5">
        <h1 class="mb-4">Dashboard Financeiro</h1>
        <div class="row">
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Saldo Total</h5>
                        <h3 id="totalBalance">R$ 0,00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Receitas</h5>
                        <h3 id="totalIncome" class="text-success">R$ 0,00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Despesas</h5>
                        <h3 id="totalExpenses" class="text-danger">R$ 0,00</h3>
                    </div>
                </div>
            </div>
        </div>


        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Adicionar Transação</h5>
                        <form id="transactionForm">
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label for="description" class="form-label">Descrição</label>
                                    <input type="text" class="form-control" id="description" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="amount" class="form-label">Valor</label>
                                    <input type="number" class="form-control" id="amount" step="0.01" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="type" class="form-label">Tipo</label>
                                    <select class="form-control" id="type" required>
                                        <option value="expense">Despesa</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="category" class="form-label">Categoria</label>
                                    <select class="form-control" id="category" required>
                                        <option value="food">Alimentação</option>
                                        <option value="transport">Transporte</option>
                                        <option value="housing">Moradia</option>
                                        <option value="others">Outros</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Adicionar Transação</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Histórico de Transações</h5>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Data</th>
                                        <th>Descrição</th>
                                        <th>Categoria</th>
                                        <th>Valor</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionsList">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
