<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/backend/style.css">
  <title>Financial Planner</title>
</head>

<body>
  <header>
    <h1>{0101010101}</h1>
  </header>

  <div class="container">
    <div class="flex-col" id="top-section">
      <!-- Month selector e resumo financeiro serão inseridos aqui pelo JS -->
    </div>

    <!-- Amount Cards Banner -->
    <div class="flex-row">
      <div class="card flex-1">
        <h3 class="card-title">Credit Card 👁️</h3>
        <p class="amount" id="credit-card-amount">R$ 0,00</p>
      </div>
      <div class="card flex-1">
        <h3 class="card-title">Recorrente</h3>
        <p class="amount" id="recurring-amount">R$ 0,00</p>
      </div>
      <div class="card flex-1">
        <h3 class="card-title">Sazonal</h3>
        <p class="amount" id="seasonal-amount">R$ 0,00</p>
      </div>
    </div>

    <!-- Add new expense -->
    <div class="card">
      <h2 class="card-title">Adicionar Nova Despesa</h2>
      <div class="form-grid">
        <input type="text" id="expense-description" placeholder="Descrição">
        <input type="number" id="expense-amount" step="0.01" placeholder="Valor">
        <select id="expense-category">
          <option value="">Selecione a categoria</option>
          <!-- Categorias serão inseridas aqui pelo JS -->
        </select>
        <input type="date" id="expense-due-date" placeholder="Data de Vencimento">
        
        <!-- Tipo de despesa (radio buttons) -->
        <div class="expense-type-container">
          <label class="expense-type-label">Tipo:</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="expense-type" value="credit-card" id="expense-type-credit-card">
              <span>Cartão de Crédito</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="expense-type" value="recurring" id="expense-type-recurring">
              <span>Recorrente</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="expense-type" value="seasonal" id="expense-type-seasonal">
              <span>Sazonal</span>
            </label>
          </div>
        </div>

        <!-- Installment options -->
        <div id="installment-options" style="display: none;">
          <div class="payment-options-container">
            <div>
              <label class="expense-type-label">Forma de Pagamento:</label>
              <select id="payment-installments" class="period-select">
                <option value="">Selecione as parcelas</option>
              </select>
            </div>
            <div id="closed-invoice-container" style="display: none;">
              <label class="checkbox-label">
                <input type="checkbox" id="closed-invoice-checkbox">
                <span>Fatura Fechada</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Recurring end date -->
        <div id="recurring-end-date" style="display: none;">
          <div class="payment-options-container">
            <div>
              <label class="expense-type-label">Mês/Ano Final:</label>
              <input type="month" id="recurring-end-date-input" class="period-select">
            </div>
          </div>
        </div>
        
        <button class="btn-primary" id="add-expense-btn">Adicionar</button>
      </div>
    </div>

    <!-- Expenses table -->
    <div class="card" style="padding: 0; overflow: hidden;">
      <div class="table-header">
        <h2 class="card-title" id="expenses-title">Despesas</h2>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Descrição</th>
              <th>Categoria</th>
              <th class="text-center">Vencimento</th>
              <th class="text-right">Valor</th>
              <th class="text-center">Pago</th>
              <th class="text-center">Ações</th>
            </tr>
          </thead>
          <tbody id="expenses-table-body">
            <!-- Expenses will be inserted here by JS -->
          </tbody>
          <!-- tfoot element removed -->
        </table>
      </div>
    </div>
  </div>

  <footer>
    <p><i>Luiz Cláudio - <span id="current-year"></span></i></p>
  </footer>

  <script src="/backend/script.js"></script>

</body>

</html>
