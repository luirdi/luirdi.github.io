<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinPla - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/styles.css" />
    <style>
      .login-container {
        max-width: 400px;
        margin: 100px auto;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .auth-toggle {
        margin-top: 1rem;
        text-align: center;
      }
      .social-login {
        margin-top: 1.5rem;
        text-align: center;
      }
      .social-login .btn {
        margin-bottom: 0.5rem;
      }
      .divider {
        display: flex;
        align-items: center;
        margin: 1rem 0;
      }
      .divider::before, .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #dee2e6;
      }
      .divider span {
        padding: 0 1rem;
        color: #6c757d;
      }
      .auth-options {
        margin-top: 1rem;
        display: flex;
        justify-content: space-between;
      }
      .auth-options a {
        font-size: 0.9rem;
        color: #6c757d;
        text-decoration: none;
      }
      .auth-options a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="login-container">
        <div class="card">
          <div class="card-body">
            <h2 class="text-center mb-4">FinPla</h2>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
              <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" class="form-control" id="loginEmail" required />
              </div>
              <div class="form-group">
                <label for="loginPassword">Senha</label>
                <input type="password" class="form-control" id="loginPassword" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">Entrar</button>
              
              <div class="auth-options">
                <a href="#" onclick="resetPassword(); return false;">Esqueci minha senha</a>
              </div>
            </form>

            <!-- Register Form (initially hidden) -->
            <form id="registerForm" class="auth-form d-none">
              <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" class="form-control" id="registerEmail" required />
              </div>
              <div class="form-group">
                <label for="registerPassword">Senha</label>
                <input type="password" class="form-control" id="registerPassword" required />
              </div>
              <div class="form-group">
                <label for="confirmPassword">Confirmar Senha</label>
                <input type="password" class="form-control" id="confirmPassword" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">Registrar</button>
            </form>
            


            <!-- Social Login Options -->
            <div class="social-login">
              <div class="divider"><span>ou</span></div>
              <button class="btn btn-outline-light rounded-circle p-2" onclick="signInWithGoogle()" title="Entrar com Google" id="googleLogin">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="24" height="24">
              </button>

            </div>

            <!-- Toggle between login and register -->
            <div class="auth-toggle">
              <a href="#" id="authToggle">Criar uma conta</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-auth-compat.js"></script>

    <script src="/frontend/auth.js"></script>
  </body>
</html>
