<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificação de Email - FinPla</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/frontend/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body text-center">
              <h2 class="mb-4">Verifique seu Email</h2>
              <p class="mb-4">
                Um link de verificação foi enviado para o seu email.
                Por favor, verifique sua caixa de entrada e clique no link para ativar sua conta.
              </p>
              <p class="mb-4">
                Não recebeu o email?
                <a href="#" onclick="resendVerificationEmail(); return false;">Reenviar email de verificação</a>
              </p>
              <p>
                <a href="/login.html" class="btn btn-primary">Voltar para o Login</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-auth-compat.js"></script>
    <script>
      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyDNipGBlG1w1FlCVknNxA3WYv8TMYL85bs",
        authDomain: "finpla-c575c.firebaseapp.com",
        databaseURL: "https://finpla-c575c-default-rtdb.firebaseio.com",
        projectId: "finpla-c575c",
        storageBucket: "finpla-c575c.firebasestorage.app",
        messagingSenderId: "417838979466",
        appId: "1:417838979466:web:91481c276febd368075073",
        measurementId: "G-KS97CRRJ11",
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      function resendVerificationEmail() {
        const user = auth.currentUser;
        if (user) {
          user.sendEmailVerification()
            .then(() => {
              alert('Email de verificação reenviado!');
            })
            .catch((error) => {
              alert('Erro ao reenviar email: ' + error.message);
            });
        } else {
          window.location.href = '/login.html';
        }
      }

      // Check auth state
      auth.onAuthStateChanged((user) => {
        if (!user) {
          window.location.href = '/login.html';
        }
      });
    </script>
  </body>
</html>
